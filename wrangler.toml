# Cloudflare Workers Configuration for BLT-Next

name = "blt-next"
main = "workers/main.py"
compatibility_date = "2026-03-12"
compatibility_flags = [ "python_workers" ]

[assets]
directory = "src"
binding = "ASSETS"

# Environment variables (set production values in Cloudflare dashboard or override in [env.*])
[vars]
ALLOWED_ORIGIN = "http://localhost"  # Override in production via Cloudflare dashboard
# ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# - JWT_SECRET
# - DATABASE_URL
# - ENCRYPTION_KEY
# - SENDGRID_WEBHOOK_KEY  (SendGrid Event Webhook verification key – see Mail Settings → Event Webhooks)

# KV Namespaces for caching
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

[[d1_databases]]
binding = "DB"
database_name = "blt-database"
database_id = "27d79830-7681-4e22-ad2d-12ad94e0d7cd" # Placeholder ID

# Development
[env.development]
name = "blt-api-dev"



# Triggers
[triggers]
crons = []

# Observability
[observability]
enabled = true
head_sampling_rate = 1
